name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build_release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Download binaries (ffmpeg, ffprobe, yt-dlp)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin
          
          # Download yt-dlp
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "bin\yt-dlp.exe"
          
          # Download and extract FFmpeg (BtbN Windows build)
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive "ffmpeg.zip" -DestinationPath "ffmpeg_temp"
          
          # Copy executables to bin\
          Copy-Item "ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" -Destination "bin\ffmpeg.exe"
          Copy-Item "ffmpeg_temp\ffmpeg-master-latest-win64-gpl\bin\ffprobe.exe" -Destination "bin\ffprobe.exe"

      - name: Build Executable
        run: python build.py

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          name: Release ${{ github.ref_name }}
          files: dist/SentenceMiner.exe
          generate_release_notes: true
